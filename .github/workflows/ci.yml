name: CI/CD workflow
on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs: 
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: clonar repositorio
        uses: actions/checkout@v3 
      - name: configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependencias
        run: npm install
      - name: Ejecutar pruebas
        run: npm test
      - name: Ejecutar linter
        run: npm run lint
  despliegue-produccion:
    name: Desplegar en vercel
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env: 
      VERCEL_ORGID: ${{ secrets.VERCEL_ORGID }}
      VERCEL_PROJECTID: ${{ secrets.VERCEL_PROJECTID }}
    steps:
      - name: clonar repositorio
        uses: actions/checkout@v3 
      - name: configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependencias
        run: npm install
      - name: instalar vercel
        run: npm install --global vercel@latest
      - name: Obtener configuracion de vercel
        run: vercel pull --yes --environment=production --token=${{secrets.VERCEL_TOKEN}}
      - name: Construir el proyecto
        run: vercel build --prod --token=${{secrets.VERCEL_TOKEN}}
      - name: Desplegar en produccion
        run: vercell deploy --prebuilt --prod --token=${{secrets.VERCEL_TOKEN}}
      
